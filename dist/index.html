<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>高雄星空觀測儀 — 即時星圖</title>
    <meta
      name="description"
      content="高雄即時互動星圖，展示恆星位置、星座連線與亮度，支援 120 FPS 流暢動畫。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Rajdhani:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #03050f;
        --panel: rgba(5, 12, 35, 0.82);
        --border: rgba(80, 140, 255, 0.18);
        --accent: #5b8fff;
        --accent2: #a78bfa;
        --text: #c8d8f8;
        --dim: #5a6a8a;
        --glow: rgba(91, 143, 255, 0.35);
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: 'Outfit', sans-serif;
        overflow: hidden;
        user-select: none;
      }

      #canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        cursor: grab;
        touch-action: none;
      }

      #canvas:active {
        cursor: grabbing;
      }

      /* HUD overlay */
      #hud {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        pointer-events: none;
        z-index: 10;
      }

      /* Top-left clock */
      #clock-panel {
        position: absolute;
        top: 22px;
        left: 22px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px 20px;
        backdrop-filter: blur(14px);
        pointer-events: auto;
        min-width: 220px;
      }

      #clock-panel .label {
        font-size: 10px;
        letter-spacing: 2.5px;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 4px;
      }

      #clock-panel .time {
        font-family: 'Rajdhani', sans-serif;
        font-size: 28px;
        font-weight: 600;
        color: #e8f0ff;
        line-height: 1;
      }

      #clock-panel .date {
        font-size: 12px;
        color: var(--dim);
        margin-top: 4px;
      }

      #clock-panel .location {
        font-size: 11px;
        color: var(--accent2);
        margin-top: 6px;
        letter-spacing: 0.5px;
      }

      #clock-panel .fps-bar {
        margin-top: 8px;
        font-size: 10px;
        color: var(--dim);
      }

      #fps-val {
        color: #4ade80;
        font-weight: 600;
      }

      /* Top-right controls */
      #controls {
        position: absolute;
        top: 22px;
        right: 22px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        pointer-events: auto;
      }

      .btn {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 9px 16px;
        color: var(--text);
        font-family: 'Outfit', sans-serif;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.5px;
        cursor: pointer;
        backdrop-filter: blur(14px);
        transition: all 0.2s;
        text-align: center;
        white-space: nowrap;
      }

      .btn:hover {
        background: rgba(91, 143, 255, 0.2);
        border-color: var(--accent);
        color: #fff;
      }

      .btn.active {
        background: rgba(91, 143, 255, 0.3);
        border-color: var(--accent);
        color: #fff;
      }

      /* Bottom info bar */
      #info-bar {
        position: absolute;
        bottom: 22px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px 22px;
        backdrop-filter: blur(14px);
        font-size: 12px;
        color: var(--dim);
        letter-spacing: 0.3px;
        pointer-events: none;
        white-space: nowrap;
      }

      /* Star tooltip */
      #tooltip {
        position: absolute;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 14px;
        backdrop-filter: blur(16px);
        font-size: 12px;
        color: var(--text);
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.2s;
        max-width: 200px;
      }

      #tooltip.show {
        opacity: 1;
      }

      #tooltip .star-name {
        font-size: 15px;
        font-weight: 700;
        color: #e0eaff;
        margin-bottom: 4px;
      }

      #tooltip .star-meta {
        color: var(--dim);
        line-height: 1.6;
      }

      #tooltip .star-mag {
        color: var(--accent2);
      }

      /* Legend */
      #legend {
        position: absolute;
        bottom: 22px;
        left: 22px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px 16px;
        backdrop-filter: blur(14px);
        font-size: 11px;
        pointer-events: auto;
      }

      #legend .leg-title {
        font-size: 10px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 8px;
      }

      .leg-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 5px;
        color: var(--dim);
      }

      .leg-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      /* Compass */
      #compass {
        position: absolute;
        bottom: 22px;
        right: 22px;
        width: 90px;
        height: 90px;
        pointer-events: none;
      }
    </style>
    <script type="module" crossorigin src="/assets/index-CTnsxo9Z.js"></script>
  </head>

  <body>
    <canvas id="canvas"></canvas>

    <div id="hud">
      <div id="clock-panel">
        <div class="label">&#128205; 高雄觀測站</div>
        <div class="time" id="time-display">--:--:--</div>
        <div class="date" id="date-display">----年--月--日</div>
        <div class="location">22.6°N &nbsp;120.3°E &nbsp;UTC+8</div>
        <div class="fps-bar">FPS: <span id="fps-val">--</span></div>
      </div>

      <div id="controls">
        <button class="btn active" id="btn-atmosphere">🌤️ 大氣/日光</button>
        <button class="btn" id="btn-constellations">✦ 星座連線</button>
        <button class="btn" id="btn-con-names">⊹ 星座名稱</button>
        <button class="btn" id="btn-star-names">◎ 恆星名稱</button>
        <button class="btn active" id="btn-milkyway">⬥ 銀河</button>
        <button class="btn" id="btn-grid">⊞ 地平座標</button>
        <button class="btn" id="btn-equatorial">⊕ 赤道座標</button>
        <button class="btn" id="btn-ecliptic">∿ 黃道</button>
        <button class="btn" id="btn-reset">↺ 重置視角</button>
      </div>

      <div id="info-bar">
        滾輪縮放 · 拖曳旋轉視角 &nbsp;|&nbsp;
        <span style="color: #5b8fff">T</span>大氣/日光 <span style="color: #5b8fff">C</span>星座
        <span style="color: #5b8fff">M</span>銀河 <span style="color: #5b8fff">Z</span>天頂
        <span style="color: #5b8fff">R</span>重置
      </div>

      <div id="tooltip">
        <div class="star-name" id="tt-name"></div>
        <div class="star-meta" id="tt-meta"></div>
      </div>

      <div id="legend">
        <div class="leg-title">星等亮度</div>
        <div class="leg-row">
          <div
            class="leg-dot"
            style="background: #fff8e0; width: 14px; height: 14px; box-shadow: 0 0 6px #fff8e0"
          ></div>
          ≤ 0 等
        </div>
        <div class="leg-row">
          <div class="leg-dot" style="background: #f0eaff; width: 10px; height: 10px"></div>
          1–2 等
        </div>
        <div class="leg-row">
          <div class="leg-dot" style="background: #c8d8ff; width: 7px; height: 7px"></div>
          3–4 等
        </div>
        <div class="leg-row">
          <div class="leg-dot" style="background: #8090b0; width: 4px; height: 4px"></div>
          5–6 等
        </div>
      </div>

      <svg id="compass" viewBox="0 0 90 90">
        <circle
          cx="45"
          cy="45"
          r="42"
          fill="rgba(5,12,35,0.7)"
          stroke="rgba(80,140,255,0.2)"
          stroke-width="1"
        />
        <text
          x="45"
          y="14"
          text-anchor="middle"
          fill="#ff6b6b"
          font-size="11"
          font-family="Rajdhani"
          font-weight="600"
        >
          N
        </text>
        <text x="45" y="83" text-anchor="middle" fill="#aaa" font-size="11" font-family="Rajdhani">
          S
        </text>
        <text x="10" y="50" text-anchor="middle" fill="#aaa" font-size="11" font-family="Rajdhani">
          W
        </text>
        <text x="81" y="50" text-anchor="middle" fill="#aaa" font-size="11" font-family="Rajdhani">
          E
        </text>
        <line x1="45" y1="18" x2="45" y2="30" stroke="#ff6b6b" stroke-width="1.5" />
        <line x1="45" y1="60" x2="45" y2="72" stroke="#555" stroke-width="1" />
        <line x1="18" y1="45" x2="30" y2="45" stroke="#555" stroke-width="1" />
        <line x1="60" y1="45" x2="72" y2="45" stroke="#555" stroke-width="1" />
      </svg>
    </div>

  </body>
</html>
