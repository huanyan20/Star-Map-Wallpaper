<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>高雄星空觀測儀 — 即時星圖</title>
  <meta name="description" content="高雄即時互動星圖，展示恆星位置、星座連線與亮度，支援 120 FPS 流暢動畫。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Rajdhani:wght@400;600&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #03050f;
      --panel: rgba(5, 12, 35, 0.82);
      --border: rgba(80, 140, 255, 0.18);
      --accent: #5b8fff;
      --accent2: #a78bfa;
      --text: #c8d8f8;
      --dim: #5a6a8a;
      --glow: rgba(91, 143, 255, 0.35);
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      overflow: hidden;
      user-select: none;
    }

    #canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: grab;
      touch-action: none;
    }

    #canvas:active {
      cursor: grabbing;
    }

    /* HUD overlay */
    #hud {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
      z-index: 10;
    }

    /* Top-left clock */
    #clock-panel {
      position: absolute;
      top: 22px;
      left: 22px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 20px;
      backdrop-filter: blur(14px);
      pointer-events: auto;
      min-width: 220px;
    }

    #clock-panel .label {
      font-size: 10px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 4px;
    }

    #clock-panel .time {
      font-family: 'Rajdhani', sans-serif;
      font-size: 28px;
      font-weight: 600;
      color: #e8f0ff;
      line-height: 1;
    }

    #clock-panel .date {
      font-size: 12px;
      color: var(--dim);
      margin-top: 4px;
    }

    #clock-panel .location {
      font-size: 11px;
      color: var(--accent2);
      margin-top: 6px;
      letter-spacing: 0.5px;
    }

    #clock-panel .fps-bar {
      margin-top: 8px;
      font-size: 10px;
      color: var(--dim);
    }

    #fps-val {
      color: #4ade80;
      font-weight: 600;
    }

    /* Top-right controls */
    #controls {
      position: absolute;
      top: 22px;
      right: 22px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: auto;
    }

    .btn {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 16px;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      backdrop-filter: blur(14px);
      transition: all 0.2s;
      text-align: center;
      white-space: nowrap;
    }

    .btn:hover {
      background: rgba(91, 143, 255, 0.2);
      border-color: var(--accent);
      color: #fff;
    }

    .btn.active {
      background: rgba(91, 143, 255, 0.3);
      border-color: var(--accent);
      color: #fff;
    }

    /* Bottom info bar */
    #info-bar {
      position: absolute;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 22px;
      backdrop-filter: blur(14px);
      font-size: 12px;
      color: var(--dim);
      letter-spacing: 0.3px;
      pointer-events: none;
      white-space: nowrap;
    }

    /* Star tooltip */
    #tooltip {
      position: absolute;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      backdrop-filter: blur(16px);
      font-size: 12px;
      color: var(--text);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      max-width: 200px;
    }

    #tooltip.show {
      opacity: 1;
    }

    #tooltip .star-name {
      font-size: 15px;
      font-weight: 700;
      color: #e0eaff;
      margin-bottom: 4px;
    }

    #tooltip .star-meta {
      color: var(--dim);
      line-height: 1.6;
    }

    #tooltip .star-mag {
      color: var(--accent2);
    }

    /* Legend */
    #legend {
      position: absolute;
      bottom: 22px;
      left: 22px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      backdrop-filter: blur(14px);
      font-size: 11px;
      pointer-events: auto;
    }

    #legend .leg-title {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .leg-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
      color: var(--dim);
    }

    .leg-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Compass */
    #compass {
      position: absolute;
      bottom: 22px;
      right: 22px;
      width: 90px;
      height: 90px;
      pointer-events: none;
    }
  </style>
</head>

<body>

  <canvas id="canvas"></canvas>

  <div id="hud">
    <div id="clock-panel">
      <div class="label">&#128205; 高雄觀測站</div>
      <div class="time" id="time-display">--:--:--</div>
      <div class="date" id="date-display">----年--月--日</div>
      <div class="location">22.6°N &nbsp;120.3°E &nbsp;UTC+8</div>
      <div class="fps-bar">FPS: <span id="fps-val">--</span></div>
    </div>

    <div id="controls">
      <button class="btn active" id="btn-atmosphere">🌤️ 大氣/日光</button>
      <button class="btn" id="btn-constellations">✦ 星座連線</button>
      <button class="btn" id="btn-con-names">⊹ 星座名稱</button>
      <button class="btn" id="btn-star-names">◎ 恆星名稱</button>
      <button class="btn active" id="btn-milkyway">⬥ 銀河</button>
      <button class="btn" id="btn-grid">⊞ 地平座標</button>
      <button class="btn" id="btn-equatorial">⊕ 赤道座標</button>
      <button class="btn" id="btn-ecliptic">∿ 黃道</button>
      <button class="btn" id="btn-reset">↺ 重置視角</button>
    </div>

    <div id="info-bar">
      滾輪縮放 · 拖曳旋轉視角 &nbsp;|&nbsp;
      <span style="color:#5b8fff">T</span>大氣/日光
      <span style="color:#5b8fff">C</span>星座
      <span style="color:#5b8fff">M</span>銀河
      <span style="color:#5b8fff">Z</span>天頂
      <span style="color:#5b8fff">R</span>重置
    </div>

    <div id="tooltip">
      <div class="star-name" id="tt-name"></div>
      <div class="star-meta" id="tt-meta"></div>
    </div>

    <div id="legend">
      <div class="leg-title">星等亮度</div>
      <div class="leg-row">
        <div class="leg-dot" style="background:#fff8e0;width:14px;height:14px;box-shadow:0 0 6px #fff8e0;"></div>≤ 0 等
      </div>
      <div class="leg-row">
        <div class="leg-dot" style="background:#f0eaff;width:10px;height:10px;"></div>1–2 等
      </div>
      <div class="leg-row">
        <div class="leg-dot" style="background:#c8d8ff;width:7px;height:7px;"></div>3–4 等
      </div>
      <div class="leg-row">
        <div class="leg-dot" style="background:#8090b0;width:4px;height:4px;"></div>5–6 等
      </div>
    </div>

    <svg id="compass" viewBox="0 0 90 90">
      <circle cx="45" cy="45" r="42" fill="rgba(5,12,35,0.7)" stroke="rgba(80,140,255,0.2)" stroke-width="1" />
      <text x="45" y="14" text-anchor="middle" fill="#ff6b6b" font-size="11" font-family="Rajdhani"

      <line x1="60" y1="45" x2="72" y2="45" stroke="#555" stroke-width="1" />
    </svg>
  </div>

    let _camLx=0, _camLy=1, _camLz=0;

    let _camUx=0, _camUy=0, _camUz=1;
    let _camF=500;

    function updateCamCache(){
      _camLx = Math.sin(lookAz)*Math.cos(lookEl);
      _camLy = Math.cos(lookAz)*Math.cos(lookEl);
      _camLz = Math.sin(lookEl);
      _camRx =  Math.cos(lookAz);
      _camRy = -Math.sin(lookAz);
      _camUx = _camRy*_camLz;
      _camUy = -_camRx*_camLz;
      _camUz = _camRx*_camLy - _camRy*_camLx;
      _camF  = focalLen();

    function altAzToXY(alt_rad, az_rad) {
      if (alt_rad < toRad(-10)) return null;
      const sx = Math.sin(az_rad) * Math.cos(alt_rad);
      const sy = Math.cos(az_rad) * Math.cos(alt_rad);
      const sz = Math.sin(alt_rad);
      const depth = sx*_camLx + sy*_camLy + sz*_camLz;
      if (depth < -0.5) return null;
      const pr = sx*_camRx + sy*_camRy;
      const pu = sx*_camUx + sy*_camUy + sz*_camUz;
      const k = 2 / (1 + depth);
      const px = CX + pr * k * _camF;
      const py = CY - pu * k * _camF;
      if (px < -W * 2 || px > W * 3 || py < -H * 2 || py > H * 3) return null;
      return { x: px, y: py };

      const alphas = [0.25, 0.50, 0.75, 1.0];

          const xe = Math.cos(dec) * Math.cos(ra);
          const ye = Math.cos(dec) * Math.sin(ra);
          const ze = Math.sin(dec);

          // Mag 6.5 -> small size, Mag 0 -> large size
          const size = Math.max(0.4, 2.8 - mag * 0.35);

          const bIdx = cIdx * 4 + aIdx;

          tempBuckets[bIdx].push(xe, ye, ze, size);

    function drawBackground(sunAlt_deg, ts) {
      const hy = horizonY();
      // Sky colour transitions: night → twilight → dawn → day
      const t = Math.max(0, Math.min(1, (sunAlt_deg + 18) / 30));   // 0 at -18°, 1 at +12°
      const t2 = Math.max(0, Math.min(1, (sunAlt_deg + 4) / 14));   // 0 at -4°, 1 at +10°

      function lerp3(a, b, f) { return a.map((v, i) => Math.round(v + (b[i] - v) * f)); }

      const tR = Math.round(t * 200), t2R = Math.round(t2 * 200), hyR = Math.round(hy);

        _bgCache.topRGB = lerp3(lerp3(nightTop, twilightTop, t), dayTop, t2);
        _bgCache.horRGB = lerp3(lerp3(nightHor, twilightHor, t), dayHor, t2);

        _bgCache.t = tR; _bgCache.t2 = t2R; _bgCache.hy = hyR;

        // ctx.fillRect(0, 0, W, Math.max(0, hy));

      if (hy < H) {
        // drawOcean(hy, ts, horRGB);

    function drawOcean(hy, ts, horRGB) {
      ctx.save();
      ctx.beginPath();
      ctx.rect(0, hy, W, H - hy);
      ctx.clip(); // Restrict to below horizon

      // Base water color (reflection of horizon, darkened)
      const grad = ctx.createLinearGradient(0, hy, 0, H);
      grad.addColorStop(0, `rgb(${horRGB.map(c => Math.max(5, c - 50)).join(',')})`);

      ctx.globalCompositeOperation = 'screen';

        const speed = 0.0008 * (i + 1);
        const freq = 0.01 + i * 0.005;

        // Further waves are smaller and less transparent
        ctx.globalAlpha = 0.15 - (i * 0.03);

        ctx.moveTo(0, H);

          const y = hy + amp * Math.sin(x * freq + ts * speed + i * 100) + (i * 12);
          ctx.lineTo(x, y);
        }
        ctx.lineTo(W, H);
        ctx.fill();
      }
      ctx.restore();

    function drawHorizonGlow(sunAlt_deg, sunAz_rad) {
      const hy = horizonY();

      azDiff = (azDiff + Math.PI * 3) % (Math.PI * 2) - Math.PI;

          sGrad.addColorStop(0, 'rgba(0,0,0,0)');
          sGrad.addColorStop(1, 'rgba(10,15,30,0.6)');
          ctx.globalCompositeOperation = 'source-over';
          ctx.globalAlpha = venusT * antiSunAlpha;
          ctx.fillStyle = sGrad;
          ctx.fillRect(0, hy - 40, W, 40);
        }
        ctx.restore();
      }

      // 2. Sunset/Sunrise Directional Mie Scatter (Towards sun)
      const glowT = Math.max(0, 1 - Math.abs(sunAlt_deg - 3) / 15); // Strongest at +3°
      const dayGlowT = Math.max(0, Math.min(1, (sunAlt_deg - 10) / 20)); // Daylight halo

      if ((glowT > 0.05 || dayGlowT > 0.05) && (sunX > -W * 1.5 && sunX < W * 2.5)) {
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';

        // Day white halo
        if (dayGlowT > 0) {
          ctx.globalAlpha = dayGlowT;
          const radius = W * 1.2;
          const dGrad = ctx.createRadialGradient(sunX, hy, 0, sunX, hy, radius);
          dGrad.addColorStop(0, 'rgba(255,255,255,0.7)');
          dGrad.addColorStop(0.3, 'rgba(200,220,255,0.25)');
          dGrad.addColorStop(1, 'rgba(0,0,0,0)');
          ctx.fillStyle = dGrad;
          ctx.fillRect(sunX - radius, hy - radius, radius * 2, radius * 2);
        }

        // Sunset/Sunrise Orange/Red Scatter
        if (glowT > 0) {
          ctx.globalAlpha = glowT;
          const radius = W * 1.5;
          const sGrad = ctx.createRadialGradient(sunX, hy + 30, 0, sunX, hy + 30, radius);
          // Dynamic colour based on sun altitude (lower = redder)
          const altShift = Math.max(0, Math.min(1, (sunAlt_deg + 4) / 8)); // 0=-4(red), 1=+4(yellow)
          const c1 = altShift > 0.5 ? '255,240,200' : '255,200,100';
          const c2 = altShift > 0.5 ? '255,200,100' : '255,100,50';
          const c3 = altShift > 0.5 ? '255,100,50' : '150,50,50';
          const c4 = altShift > 0.5 ? '100,50,100' : '50,20,80';

          sGrad.addColorStop(0, `rgba(${c1}, 0.85)`);
          sGrad.addColorStop(0.15, `rgba(${c2}, 0.55)`);
          sGrad.addColorStop(0.4, `rgba(${c3}, 0.25)`);
          sGrad.addColorStop(0.7, `rgba(${c4}, 0.05)`);
          sGrad.addColorStop(1, 'rgba(0,0,0,0)');

          ctx.fillStyle = sGrad;
          ctx.fillRect(sunX - radius, hy - radius, radius * 2, radius * 2);
        }
        ctx.restore();
      }
    }

    function drawEcliptic(lst_deg) {
      ctx.save();
      ctx.globalAlpha = 0.6;
      ctx.strokeStyle = '#ffb040'; // Orange/Gold
      ctx.lineWidth = 1.5;
      ctx.setLineDash([8, 6]); // Dashed line for ecliptic

      const eps = 23.439 * Math.PI / 180; // Obliquity of the ecliptic

      ctx.beginPath();
      let first = true;
      // Loop through ecliptic longitude (lambda) from 0 to 360
      for (let lambda_deg = 0; lambda_deg <= 360; lambda_deg += 2) {
        const lambda = lambda_deg * Math.PI / 180;

        // Convert Ecliptic (lambda, beta=0) to Equatorial (ra, dec)
        let ra = Math.atan2(Math.cos(eps) * Math.sin(lambda), Math.cos(lambda));
        const dec = Math.asin(Math.sin(eps) * Math.sin(lambda));

        // RA needs to be 0..24 hours
        ra = (ra + 2 * Math.PI) % (2 * Math.PI);
        ra = ra * 12 / Math.PI;

        const dec_deg = dec * 180 / Math.PI;

        const p = getXY(ra, dec_deg, lst_deg);
        if (!p) {
          first = true;
          continue;
        }
        first ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
        first = false;
      }
      ctx.stroke();

      // Draw "黃道" label near lambda = 90 (Summer solstice point) or center of screen
      const labelLambda = 90 * Math.PI / 180;
      let raLabel = Math.atan2(Math.cos(eps) * Math.sin(labelLambda), Math.cos(labelLambda));
      const decLabel = Math.asin(Math.sin(eps) * Math.sin(labelLambda));
      raLabel = ((raLabel + 2 * Math.PI) % (2 * Math.PI)) * 12 / Math.PI;
      const pLabel = getXY(raLabel, decLabel * 180 / Math.PI, lst_deg);
      if (pLabel && pLabel.x > 50 && pLabel.x < W - 50 && pLabel.y > 50 && pLabel.y < H - 50) {
        ctx.fillStyle = '#ffb040';
        ctx.font = '700 12px Outfit';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        // Label moved to the WebGL MSDF layer.
      }

      ctx.setLineDash([]);
      ctx.restore();
    }

    function drawFieldStars(lst_deg, ts) {
      const lstRad = toRad(lst_deg);
      const cL = Math.cos(lstRad), sL = Math.sin(lstRad);
      const cP = Math.cos(LAT_RAD), sP = Math.sin(LAT_RAD);

      // Equatorial to Horizontal matrix
      const E1 = -sL, E2 = cL, E3 = 0;
      const N1 = -sP * cL, N2 = -sP * sL, N3 = cP;
      const U1 = cP * cL, U2 = cP * sL, U3 = sP;

      // Camera look vectors
      // Use cached camera vectors
      const D1 = E1*_camLx + N1*_camLy + U1*_camLz, D2 = E2*_camLx + N2*_camLy + U2*_camLz, D3 = N3*_camLy + U3*_camLz;
      const R1 = E1*_camRx + N1*_camRy, R2 = E2*_camRx + N2*_camRy, R3 = N3*_camRy;
      const Uu1 = E1*_camUx + N1*_camUy + U1*_camUz, Uu2 = E2*_camUx + N2*_camUy + U2*_camUz, Uu3 = N3*_camUy + U3*_camUz;
      const f = _camF;
      const twinkle = 0.85 + 0.15 * Math.sin(ts * 0.003); // Global subtle twinkle

      ctx.save();
      for (let i = 0; i < FIELD_STAR_BUCKETS.length; i++) {
        const bucket = FIELD_STAR_BUCKETS[i];
        if (bucket.data.length === 0) continue;

        ctx.fillStyle = bucket.style;
        ctx.globalAlpha = twinkle;
        ctx.beginPath();

        const data = bucket.data;
        for (let j = 0, len = data.length; j < len; j += 4) {
          const X = data[j], Y = data[j + 1], Z = data[j + 2], size = data[j + 3];

          const depth = X * D1 + Y * D2 + Z * D3;
          if (depth < -0.5) continue;

          const pr = X * R1 + Y * R2 + Z * R3;
          const pu = X * Uu1 + Y * Uu2 + Z * Uu3;

          const k = 2 / (1 + depth);
          const px = CX + pr * k * f;
          const py = CY - pu * k * f;

          if (px < -W || px > W * 2 || py < -H || py > H * 2) continue;

          ctx.rect(px, py, size, size);
        }
        ctx.fill();
      }
      ctx.restore();
    }

      }
    }

    function buildWebGLLabels(lst_deg, starVisibility) {
      const labels = [];
      if (starVisibility > 0) {
        if (toggles.grid) {
          addZenithLabel(labels);
          addAltAzGridLabels(labels);
        }
        if (toggles.ecliptic) addEclipticLabel(labels, lst_deg, starVisibility);
        if (toggles.conNames) addConstellationNameLabels(labels, starVisibility);
        addStarNameLabels(labels, lst_deg, starVisibility);
      } else {
        screenPos.length = 0;
        if (toggles.grid) {
          addZenithLabel(labels);
          addAltAzGridLabels(labels);
        }
      }
      addCardinalLabels(labels);
      return labels;
    }



    /* === METEORS & SATELLITES === */

    const entities = [];

    function updateEntities(dt) {

      // Spawn Meteor (approx 1 per 3-5 seconds depending on fps)

      if (Math.random() < 0.005) {

        entities.push({

          type: 'meteor',

          alt: Math.random() * Math.PI / 2 + 0.2,

          az: Math.random() * Math.PI * 2,

          speed: 0.1 + Math.random() * 0.3, // fast

          dir: Math.random() * Math.PI * 2,

          life: 0.15 + Math.random() * 0.4,

          maxLife: 0,

          brightness: 0.5 + Math.random(),

          col: Math.random() > 0.7 ? '#aaffcc' : '#ffffff'

        });

        const m = entities[entities.length - 1];

        m.maxLife = m.life;

      }



      // Spawn Satellite (approx 1 per 30 seconds)

      if (Math.random() < 0.0005) {

        entities.push({

          type: 'satellite',

          alt: Math.random() * Math.PI / 2,

          az: Math.random() * Math.PI * 2,

          speed: 0.002 + Math.random() * 0.004, // slow

          dir: Math.random() * Math.PI * 2,

          life: 60,

          maxLife: 60,

          brightness: 0.3 + Math.random() * 0.7

        });

      }



      for (let i = entities.length - 1; i >= 0; i--) {

        const e = entities[i];

        e.life -= dt;

        if (e.life <= 0) { entities.splice(i, 1); continue; }



        // Move on sphere

        e.alt += Math.sin(e.dir) * e.speed * dt;

        e.az += Math.cos(e.dir) * e.speed * dt / Math.cos(e.alt);

      }

    }



    function drawEntities() {

      ctx.save();

      for (const e of entities) {

        const p = altAzToXY(e.alt, e.az);

        if (!p) continue;



        if (e.type === 'meteor') {

          const tailAlt = e.alt - Math.sin(e.dir) * e.speed * 0.1;

          const tailAz = e.az - Math.cos(e.dir) * e.speed * 0.1 / Math.cos(e.alt);

          const pt = altAzToXY(tailAlt, tailAz);

          if (!pt) continue;



          const alpha = Math.min(1, (e.life / e.maxLife) * 3) * e.brightness;

          const grad = ctx.createLinearGradient(pt.x, pt.y, p.x, p.y);

          grad.addColorStop(0, 'rgba(255,255,255,0)');

          grad.addColorStop(1, e.col);



          ctx.globalAlpha = alpha;

          ctx.beginPath();

          ctx.moveTo(pt.x, pt.y);

          ctx.lineTo(p.x, p.y);

          ctx.strokeStyle = grad;

          ctx.lineWidth = 1.5;

          ctx.lineCap = 'round';

          ctx.stroke();



          // head flash

          ctx.fillStyle = '#fff';

          ctx.beginPath(); ctx.arc(p.x, p.y, 1.0, 0, Math.PI * 2); ctx.fill();

        }

        else if (e.type === 'satellite') {

          const alpha = Math.min(1, Math.max(0, Math.sin(e.alt) * 2)) * Math.min(1, e.life / 5) * Math.min(1, (e.maxLife - e.life) / 5) * e.brightness;

          ctx.globalAlpha = alpha;

          ctx.fillStyle = '#ffeedd';

          ctx.beginPath(); ctx.arc(p.x, p.y, 1.2, 0, Math.PI * 2); ctx.fill();

        }

      }

      ctx.restore();

    }



    /* === MAIN LOOP === */

    let lastClockT = 0;

    let lastFrameT = 0;
    const astroCache = {
      lastCalcT: -Infinity,
      lastUnixMs: 0,
      now: null,
      lst_deg: 0,
      sunRaDec: null,
      sunAltAz: null,
      sunAlt_deg: 0,
      moonRaDec: null,
      moonPhase: 0,
      starVisibility: 1
    };

    function updateAstronomyCache(ts, now) {
      const unixMs = now.getTime();
      const jumped = astroCache.lastUnixMs && Math.abs(unixMs - astroCache.lastUnixMs) > 60000;
      if (!astroCache.now || jumped || ts - astroCache.lastCalcT >= 500) {
        const jd = julianDate(now);
        const lst_deg = getLST(now);
        const sunRaDec = getSunRaDec(jd);
        const sunAltAz = raDecToAltAz(sunRaDec.ra, sunRaDec.dec, lst_deg);
        const sunAlt_deg = sunAltAz.alt * 180 / Math.PI;
        const moonRaDec = getMoonRaDec(jd);
        const moonPhase = moonRaDec.phase;
        const starVisibility = toggles.atmosphere
          ? Math.max(0, Math.min(1, (-sunAlt_deg - 2) / 10))
          : 1.0;
        astroCache.lastCalcT = ts;
        astroCache.now = now;
        astroCache.lst_deg = lst_deg;
        astroCache.sunRaDec = sunRaDec;
        astroCache.sunAltAz = sunAltAz;
        astroCache.sunAlt_deg = sunAlt_deg;
        astroCache.moonRaDec = moonRaDec;
        astroCache.moonPhase = moonPhase;
        astroCache.starVisibility = starVisibility;
      }
      astroCache.lastUnixMs = unixMs;
      return astroCache;
    }

    function render(ts) {

      if (lastFrameT === 0) lastFrameT = ts;

      const dt = (ts - lastFrameT) / 1000;

      lastFrameT = ts;

      if (dt > 0 && dt < 0.5) updateEntities(dt);



      framesCounted++;
      if (ts - lastFPSTime >= 600) {
        fpsVal = Math.round(framesCounted * 1000 / (ts - lastFPSTime));
        fpsEl.textContent = fpsVal; framesCounted = 0; lastFPSTime = ts;
      }
      const now = new Date();
      const astro = updateAstronomyCache(ts, now);
      const lst_deg = astro.lst_deg;

      if (ts - lastClockT > 200) { updateClock(now); lastClockT = ts; }

      updateCamCache();
      buildStarPositionCache(lst_deg);

      // Sun position
      const sunRaDec = astro.sunRaDec;
      const sunAltAz = astro.sunAltAz;
      const sunAlt_deg = astro.sunAlt_deg;

      // Moon position + phase
      const moonRaDec = astro.moonRaDec;
        const moonPhase = astro.moonPhase;
      // Moon horizontal coordinates are cached with the RA/Dec update cadence.

      // Stars invisible in daylight (above -6° sun is civil twilight end)
      const starVisibility = astro.starVisibility;

      // 1. Calculate background colors
        const bgSunAlt = toggles.atmosphere ? sunAlt_deg : -18;
        drawBackground(bgSunAlt, ts); // Updates _bgCache
        
        ctx.clearRect(0, 0, W, H);
        const webglLabels = buildWebGLLabels(lst_deg, starVisibility);
        
        // 2. Render WebGL layer
        if (window.renderWebGL) {
            window.renderWebGL(
                ts, lst_deg, starVisibility, 
                _bgCache.topRGB, _bgCache.horRGB, _bgCache.hy, H,
                { ra: sunRaDec.ra, dec: sunRaDec.dec },
                { ra: moonRaDec.ra, dec: moonRaDec.dec },
                moonPhase,
                webglLabels
            );
        }
      // drawBackground(toggles.atmosphere ? sunAlt_deg : -18, ts); // Handled before clearRect
      if (toggles.atmosphere) drawHorizonGlow(sunAlt_deg, sunAltAz.az);

      // Sun (draw below clouds/stars so it blends with sky naturally)
      // if (sunAltAz.alt > toRad(-0.5)) drawSun(sunAltAz.alt, sunAltAz.az); // Migrated to WebGL

      if (starVisibility > 0) {
        if (toggles.milkyway) drawMilkyWay(lst_deg);
        drawEntities();
      } else {
        // Daytime labels are handled by the WebGL label layer.
      }

      // Moon (always on top)
      // Moon rendering migrated to WebGL

      requestAnimationFrame(render);
    }
    async function start() {
      try {
        if (window.initWebGL) await window.initWebGL();
        requestAnimationFrame(render);
      } catch (err) {
        console.error(err);
        document.getElementById('info-bar').textContent = 'WebGL asset load failed: ' + err.message;
      }
    }
    start();
  </script>
</body>
